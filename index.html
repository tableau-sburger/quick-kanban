<!doctype html>
<html lang="en">
  <head>
    <!-- =========================================================
         LEARNING SECTION 1: PAGE SETUP
         ========================================================= -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Kanban</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body data-theme="dark">
    <!-- =========================================================
         LEARNING SECTION 2: APP HEADER
         ========================================================= -->
    <header class="app-header">
      <h1>Quick Kanban</h1>
      <p>Drag tasks between columns to track project flow.</p>
    </header>

    <!-- =========================================================
         LEARNING SECTION 3: BOARD MANAGEMENT
         ========================================================= -->
    <section class="board-manager">
      <h2>Boards</h2>
      <div class="board-controls">
        <label for="board-select">Current Board</label>
        <select id="board-select"></select>

        <button id="new-board-btn" type="button">New Board</button>
        <button id="rename-board-btn" type="button">Rename Board</button>
        <button id="delete-board-btn" type="button">Delete Board</button>

        <label for="board-theme-select">Theme</label>
        <select id="board-theme-select">
          <option value="dark">Dark</option>
          <option value="ocean">Ocean</option>
          <option value="forest">Forest</option>
          <option value="sunset">Sunset</option>
        </select>
      </div>
    </section>

    <!-- =========================================================
         LEARNING SECTION 4: TASK CREATION FORM
         ========================================================= -->
    <section class="new-task-panel">
      <h2>Add Task</h2>
      <form id="task-form">
        <div class="form-row">
          <label for="task-title">Title</label>
          <input id="task-title" name="title" type="text" maxlength="80" required />
        </div>

        <div class="form-row">
          <label for="task-desc">Description</label>
          <textarea id="task-desc" name="description" rows="3" maxlength="500"></textarea>
          <small id="task-desc-counter" class="char-counter">500 characters remaining</small>
        </div>

        <div class="form-row">
          <label for="task-due-date">Due Date (optional)</label>
          <div class="date-input-wrap">
            <input id="task-due-date" name="dueDate" type="date" />
            <button id="task-due-date-open" type="button" class="date-open-btn" aria-label="Open calendar">
              Calendar
            </button>
          </div>
        </div>

        <button type="submit">Add to To Do</button>
      </form>
    </section>

    <!-- =========================================================
         LEARNING SECTION 5: BOARD COLUMNS
         ========================================================= -->
    <main class="board" id="board">
      <section class="column" data-column-id="todo">
        <h3>To Do</h3>
        <div class="drop-zone" data-column-id="todo"></div>
      </section>

      <section class="column" data-column-id="in-progress">
        <h3>In Progress</h3>
        <div class="drop-zone" data-column-id="in-progress"></div>
      </section>

      <section class="column" data-column-id="done">
        <h3>Done</h3>
        <div class="drop-zone" data-column-id="done"></div>
      </section>

      <section class="column dropped-column" data-column-id="dropped">
        <h3>Dropped / Deleted</h3>
        <div class="drop-zone" data-column-id="dropped"></div>
      </section>
    </main>

    <!-- =========================================================
         LEARNING SECTION 6: CARD TEMPLATE
         ========================================================= -->
    <template id="task-card-template">
      <article class="task-card" draggable="true">
        <div class="task-card-body">
          <div class="task-card-top-row">
            <span class="task-due-date is-empty"></span>
          </div>
          <h4 class="task-title"></h4>
          <p class="task-description"></p>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
